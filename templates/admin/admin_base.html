<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hyperlocal Marketplace Admin Control Center">
    <title>{% block title %}Hyperlocal Admin Dashboard{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Admin Custom Styles -->
    <link href="/static/css/admin.css" rel="stylesheet">
    {% block styles %}{% endblock %}
</head>
<body class="admin-body">

    <!-- Admin Responsive Sidebar -->
    <aside class="admin-sidebar" id="adminSidebar">
        <div class="admin-sidebar-brand">
            <i class="bi bi-shield-check-fill text-primary"></i>
            <span>HyperLocal Admin</span>
        </div>
        
        <ul class="admin-sidebar-menu">
            <li class="admin-sidebar-item {% block nav_dashboard %}{% endblock %}">
                <a href="/admin/dashboard" class="admin-sidebar-link">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="admin-sidebar-item {% block nav_customers %}{% endblock %}">
                <a href="/admin/customers" class="admin-sidebar-link">
                    <i class="bi bi-people"></i>
                    <span>Customers</span>
                </a>
            </li>
            <li class="admin-sidebar-item {% block nav_vendors %}{% endblock %}">
                <a href="/admin/vendors" class="admin-sidebar-link">
                    <i class="bi bi-shop"></i>
                    <span>Vendors</span>
                </a>
            </li>
            <li class="admin-sidebar-item {% block nav_products %}{% endblock %}">
                <a href="/admin/products" class="admin-sidebar-link">
                    <i class="bi bi-box-seam"></i>
                    <span>Products</span>
                </a>
            </li>
            <li class="admin-sidebar-item {% block nav_orders %}{% endblock %}">
                <a href="/admin/orders" class="admin-sidebar-link">
                    <i class="bi bi-cart-check"></i>
                    <span>Orders</span>
                </a>
            </li>
            <li class="admin-sidebar-item {% block nav_categories %}{% endblock %}">
                <a href="/admin/categories" class="admin-sidebar-link">
                    <i class="bi bi-tags"></i>
                    <span>Categories</span>
                </a>
            </li>
            <li class="admin-sidebar-item mt-4">
                <a href="/" class="admin-sidebar-link text-warning">
                    <i class="bi bi-arrow-left-circle"></i>
                    <span>Marketplace Home</span>
                </a>
            </li>
        </ul>
        
        <div class="admin-sidebar-footer">
            <div class="admin-user-profile text-truncate">
                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold" style="width: 36px; height: 36px; flex-shrink: 0;" id="adminAvatarInitials">
                    AD
                </div>
                <div class="user-details text-truncate">
                    <h6 class="text-white mb-0 text-truncate fw-semibold" id="adminUserFullName">Admin User</h6>
                    <small class="text-muted text-truncate" id="adminUserEmail">admin@hyperlocal.com</small>
                </div>
            </div>
        </div>
    </aside>

    <!-- Page Wrapper -->
    <div class="admin-wrapper">
        <!-- Header -->
        <header class="admin-header">
            <button class="sidebar-toggler" id="sidebarToggle" aria-label="Toggle Sidebar">
                <i class="bi bi-justify"></i>
            </button>
            
            <div class="d-flex align-items-center gap-3">
                <div class="dropdown">
                    <a href="#" class="d-flex align-items-center text-decoration-none text-dark gap-2 dropdown-toggle" id="adminProfileDrop" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle fs-4 text-primary"></i>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end border-0 shadow" aria-labelledby="adminProfileDrop">
                        <li><a class="dropdown-item text-danger" href="#" id="adminLogoutBtn"><i class="bi bi-box-arrow-right me-2"></i>Sign Out</a></li>
                    </ul>
                </div>
            </div>
        </header>

        <!-- Main Body -->
        <main class="admin-content-body">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Global Toast Alerts Container -->
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1080;"></div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Sidebar Toggle & Session Load Script -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const sidebar = document.getElementById("adminSidebar");
            const sidebarToggle = document.getElementById("sidebarToggle");
            
            // Sidebar responsive toggle
            if (sidebarToggle && sidebar) {
                sidebarToggle.addEventListener("click", (e) => {
                    e.preventDefault();
                    if (window.innerWidth >= 992) {
                        document.body.classList.toggle("sidebar-collapsed");
                    } else {
                        document.body.classList.toggle("sidebar-open");
                    }
                });
            }

            // Fetch profile on load to ensure user is logged in and populate sidebar details
            fetch("/api/profile")
                .then(res => {
                    if (res.status === 200) {
                        return res.json();
                    } else {
                        window.location.href = "/admin/login";
                    }
                })
                .then(data => {
                    if (data && data.user) {
                        if (data.user.role !== 'admin') {
                            window.location.href = "/admin/login";
                            return;
                        }
                        
                        // Populate UI details
                        const nameEl = document.getElementById("adminUserFullName");
                        const emailEl = document.getElementById("adminUserEmail");
                        const avatarEl = document.getElementById("adminAvatarInitials");
                        
                        if (nameEl) nameEl.textContent = data.user.fullName;
                        if (emailEl) emailEl.textContent = data.user.email;
                        
                        if (avatarEl && data.user.fullName) {
                            const parts = data.user.fullName.split(" ");
                            const initials = parts.map(p => p[0]).join("").toUpperCase().substring(0, 2);
                            avatarEl.textContent = initials;
                        }
                    }
                })
                .catch(err => {
                    console.error("Auth check failed:", err);
                    window.location.href = "/admin/login";
                });
                
            // Global Logout button handler
            const logoutBtn = document.getElementById("adminLogoutBtn");
            if (logoutBtn) {
                logoutBtn.addEventListener("click", async (e) => {
                    e.preventDefault();
                    try {
                        const res = await fetch("/api/logout", { method: "POST" });
                        if (res.status === 200) {
                            window.location.href = "/admin/login";
                        }
                    } catch (err) {
                        console.error("Logout failed:", err);
                    }
                });
            }
        });
    </script>
    
    <!-- Page Specific Script Block -->
    {% block scripts %}{% endblock %}
</body>
</html>
