<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperLocal Admin - Sign In</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        h1, h2 {
            font-family: 'Outfit', sans-serif;
        }
        .login-card {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 420px;
            width: 100%;
            padding: 3rem 2.5rem;
        }
        .btn-primary {
            background-color: #4f46e5;
            border-color: #4f46e5;
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #3730a3;
            border-color: #3730a3;
            transform: translateY(-1px);
        }
        .form-control {
            border-radius: 10px;
            padding: 0.75rem 1rem;
            border-color: #cbd5e1;
        }
        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
            border-color: #818cf8;
        }
        .back-link {
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s ease;
        }
        .back-link:hover {
            color: #4f46e5;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-primary-subtle text-primary rounded-circle mb-3" style="width: 64px; height: 64px;">
                <i class="bi bi-shield-lock-fill fs-2 text-indigo" style="color: #4f46e5;"></i>
            </div>
            <h2 class="fw-bold mb-1" style="color: #0f172a;">Control Panel</h2>
            <p class="text-muted">Sign in with Admin Credentials</p>
        </div>

        <form id="adminLoginForm">
            <div class="mb-3">
                <label for="email" class="form-label fw-medium text-secondary">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="admin@example.com" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label fw-medium text-secondary">Password</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>
            
            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary">Sign In to Dashboard</button>
            </div>
        </form>

        <div class="text-center mt-4">
            <a href="/" class="back-link">
                <i class="bi bi-arrow-left"></i>
                <span>Back to Marketplace</span>
            </a>
        </div>
    </div>

    <!-- Toast container for alerts -->
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Simple client-side toast utility
        function showToast(message, type = "success") {
            const container = document.getElementById("toastContainer");
            if (!container) return;
            const bgClass = type === "success" ? "bg-success" : "bg-danger";
            const toastId = "toast_" + Date.now();
            const html = `
                <div id="${toastId}" class="toast align-items-center ${bgClass} text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body">${message}</div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML("beforeend", html);
            const el = document.getElementById(toastId);
            const toast = new bootstrap.Toast(el, { delay: 3000 });
            toast.show();
            el.addEventListener("hidden.bs.toast", () => el.remove());
        }

        document.getElementById("adminLoginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            
            try {
                const res = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                if (res.status === 200) {
                    if (data.user.role !== "admin") {
                        showToast("Access Denied: Account does not have administrator privileges.", "danger");
                        // Automatically sign out since we logged in but role mismatch
                        await fetch("/api/logout", { method: "POST" });
                        return;
                    }
                    showToast("Login successful! Loading control panel...", "success");
                    setTimeout(() => {
                        window.location.href = "/admin/dashboard";
                    }, 1200);
                } else {
                    showToast(data.error || "Invalid credentials.", "danger");
                }
            } catch (err) {
                console.error("Login failed:", err);
                showToast("Network error. Please try again.", "danger");
            }
        });
    </script>
</body>
</html>
