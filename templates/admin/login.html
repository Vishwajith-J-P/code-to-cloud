<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperLocal Admin - Sign In</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Glassmorphic Auth Custom Stylesheet -->
    <link href="/static/css/auth_pages.css" rel="stylesheet">
</head>
<body>

    <div class="auth-bg-wrapper">
        <div class="auth-bg-blob auth-bg-blob-1"></div>
        <div class="auth-bg-blob auth-bg-blob-2"></div>
        <div class="auth-bg-blob auth-bg-blob-3"></div>

        <div class="glass-auth-card animate-fade-in-up">
            <div class="text-center mb-4">
                <h2 class="fw-bold mb-1">Control Panel</h2>
                <p class="text-white-50 fs-7">Administrative dashboard verification gate</p>
            </div>

            <!-- Role Switch Tab Menu -->
            <div class="auth-role-tabs">
                <a href="/login" class="auth-role-tab">Customer</a>
                <a href="/vendor/login" class="auth-role-tab">Vendor</a>
                <a href="/admin/login" class="auth-role-tab active">Admin</a>
            </div>

            <div class="auth-alert-container"></div>

            <form id="glassLoginForm" data-role="admin" novalidate>
                <div class="mb-3">
                    <label for="email" class="form-label">Admin Email</label>
                    <input type="email" class="form-control" id="email" placeholder="admin@example.com" required>
                </div>
                
                <div class="mb-3">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label for="password" class="form-label mb-0">Password</label>
                        <a href="#" class="text-white-50 text-decoration-none fs-8 hover-white">Forgot password?</a>
                    </div>
                    <div class="password-field-container">
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                        <button type="button" class="password-toggle-btn" aria-label="Toggle Password Visibility">
                            <i class="bi bi-eye-slash fs-5"></i>
                        </button>
                    </div>
                </div>
                
                <div class="d-flex justify-content-between align-items-center mb-4 fs-7">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label text-white-50" for="rememberMe">Remember admin secure token</label>
                    </div>
                </div>
                
                <div class="d-grid mb-4">
                    <button type="submit" class="btn btn-auth-submit btn-lg fs-6">Admin Sign In</button>
                </div>
                
                <div class="text-center mt-4">
                    <a href="/" class="text-white-50 text-decoration-none fs-8 hover-white">
                        <i class="bi bi-arrow-left"></i> Back to Marketplace
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/auth_validation.js"></script>
</body>
</html>
