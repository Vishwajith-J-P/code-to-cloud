{% extends "base.html" %}

{% block title %}Hyperlocal Marketplace - My Profile{% endblock %}

{% block content %}
<div class="container my-5">
    <div id="profileContainer" class="animate-fade-in-up">
        <!-- Dynamic profile cards loaded via JavaScript -->
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading profile...</span>
            </div>
            <p class="text-muted mt-2">Loading user session details...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/cart.js"></script>
{% endblock %}
