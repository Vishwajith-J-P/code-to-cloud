{% extends "base.html" %}

{% block title %}Hyperlocal Marketplace - Login{% endblock %}

{% block content %}
<!-- Custom stylesheet specifically for authentication view styling -->
<link href="/static/css/auth_pages.css" rel="stylesheet">

<div class="auth-bg-wrapper">
    <!-- Glowing background mesh blobs -->
    <div class="auth-bg-blob auth-bg-blob-1"></div>
    <div class="auth-bg-blob auth-bg-blob-2"></div>
    <div class="auth-bg-blob auth-bg-blob-3"></div>

    <!-- Frosted Glass Card -->
    <div class="glass-auth-card animate-fade-in-up">
        <div class="text-center mb-4">
            <h2 class="fw-bold mb-1">Welcome Back</h2>
            <p class="text-white-50 fs-7">Connect and trade with your neighborhood</p>
        </div>

        <!-- Role Switch Tab Menu -->
        <div class="auth-role-tabs">
            <a href="/login" class="auth-role-tab active">Customer</a>
            <a href="/vendor/login" class="auth-role-tab">Vendor</a>
            <a href="/admin/login" class="auth-role-tab">Admin</a>
        </div>

        <!-- Alert placeholder for custom Bootstrap Alert notifications -->
        <div class="auth-alert-container"></div>

        <!-- Form submitting to AJAX handler -->
        <form id="glassLoginForm" data-role="customer" novalidate>
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
            </div>
            
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label for="password" class="form-label mb-0">Password</label>
                </div>
                <div class="password-field-container">
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                    <button type="button" class="password-toggle-btn" aria-label="Toggle Password Visibility">
                        <i class="bi bi-eye-slash fs-5"></i>
                    </button>
                </div>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mb-4 fs-7">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label text-white-50" for="rememberMe">Remember me</label>
                </div>
            </div>
            
            <div class="d-grid mb-4">
                <button type="submit" class="btn btn-auth-submit btn-lg fs-6">Sign In</button>
            </div>
            
            <div class="d-flex align-items-center mb-4">
                <hr class="flex-grow-1 border-white-50">
                <span class="px-3 text-white-50 fs-7">OR</span>
                <hr class="flex-grow-1 border-white-50">
            </div>
            
            <div class="d-grid mb-4">
                <a href="/login/google" class="btn btn-light btn-lg fs-6 d-flex justify-content-center align-items-center gap-2" style="background: rgba(255,255,255,0.9); border: none;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" width="20" height="20">
                    <span class="text-dark fw-medium">Sign in with Google</span>
                </a>
            </div>

            <div class="text-center fs-7 text-white-50">
                Don't have an account? <a href="/register" class="text-white fw-semibold text-decoration-none hover-underline">Register here</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/auth_validation.js"></script>
{% endblock %}
