{% extends "base.html" %}

{% block title %}Hyperlocal Marketplace - Login{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center align-items-center" style="min-height: 60vh;">
        <div class="col-md-6 col-lg-5 col-xl-4 animate-fade-in-up">
            <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 bg-white">
                <div class="text-center mb-4">
                    <div class="bg-primary-subtle text-primary d-inline-flex p-3 rounded-circle mb-3">
                        <i class="bi bi-shield-lock-fill fs-2"></i>
                    </div>
                    <h2 class="fw-bold mb-1">Welcome Back</h2>
                    <p class="text-muted">Sign in to manage your cart & orders</p>
                </div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control py-2 rounded-3 border-slate-200" id="email" placeholder="name@example.com" required>
                    </div>
                    
                    <div class="mb-4">
                        <div class="d-flex justify-content-between mb-1">
                            <label for="password" class="form-label mb-0">Password</label>
                            <a href="#" class="text-primary text-decoration-none fs-8">Forgot password?</a>
                        </div>
                        <input type="password" class="form-control py-2 rounded-3 border-slate-200" id="password" placeholder="••••••••" required>
                    </div>
                    
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary py-2.5 rounded-3 fw-semibold">Sign In</button>
                    </div>
                    
                    <div class="text-center fs-7 text-muted">
                        Don't have an account? <a href="/register" class="text-primary text-decoration-none fw-semibold">Register here</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/auth.js"></script>
{% endblock %}
