{% extends "base.html" %}

{% block title %}Hyperlocal Marketplace - Register{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 col-xl-5 animate-fade-in-up">
            <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 bg-white">
                <div class="text-center mb-4">
                    <div class="bg-primary-subtle text-primary d-inline-flex p-3 rounded-circle mb-3">
                        <i class="bi bi-person-plus-fill fs-2"></i>
                    </div>
                    <h2 class="fw-bold mb-1">Create Account</h2>
                    <p class="text-muted">Register to start ordering or selling locally</p>
                </div>
                
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input type="text" class="form-control py-2 rounded-3 border-slate-200" id="fullName" placeholder="John Doe" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control py-2 rounded-3 border-slate-200" id="email" placeholder="john@example.com" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password (Min 6 characters)</label>
                        <input type="password" class="form-control py-2 rounded-3 border-slate-200" id="password" placeholder="••••••••" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control py-2 rounded-3 border-slate-200" id="phone" placeholder="+1234567890" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="address" class="form-label">Delivery Address / Shop Address</label>
                        <textarea class="form-control rounded-3 border-slate-200" id="address" rows="2" placeholder="Full street address..." required></textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label for="role" class="form-label">Select Account Type</label>
                        <select class="form-select py-2 rounded-3 border-slate-200" id="role">
                            <option value="customer" selected>Customer (Buy products)</option>
                            <option value="vendor">Vendor (Sell products)</option>
                            <option value="admin">Administrator (Manage portal)</option>
                        </select>
                    </div>
                    
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary py-2.5 rounded-3 fw-semibold">Sign Up</button>
                    </div>
                    
                    <div class="text-center fs-7 text-muted">
                        Already have an account? <a href="/login" class="text-primary text-decoration-none fw-semibold">Login here</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/auth.js"></script>
{% endblock %}
