{% extends "base.html" %}

{% block title %}Hyperlocal Marketplace - Register{% endblock %}

{% block content %}
<link href="/static/css/auth_pages.css" rel="stylesheet">

<div class="auth-bg-wrapper">
    <div class="auth-bg-blob auth-bg-blob-1"></div>
    <div class="auth-bg-blob auth-bg-blob-2"></div>
    <div class="auth-bg-blob auth-bg-blob-3"></div>

    <div class="glass-auth-card register-card animate-fade-in-up">
        <div class="text-center mb-4">
            <h2 class="fw-bold mb-1">Create Account</h2>
            <p class="text-white-50 fs-7">Register to start buying or listing locally</p>
        </div>

        <div class="auth-alert-container"></div>

        <form id="glassRegisterForm" novalidate>
            <div class="row g-3">
                <div class="col-md-6 mb-2">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName" placeholder="John Doe" required>
                </div>
                
                <div class="col-md-6 mb-2">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="john@example.com" required>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-md-6 mb-2">
                    <label for="password" class="form-label">Password (Min 6 chars)</label>
                    <div class="password-field-container">
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                        <button type="button" class="password-toggle-btn" aria-label="Toggle Password Visibility">
                            <i class="bi bi-eye-slash fs-5"></i>
                        </button>
                    </div>
                </div>
                
                <div class="col-md-6 mb-2">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="phone" placeholder="+15550100" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="address" class="form-label">Delivery Address / Shop Location</label>
                <textarea class="form-control" id="address" rows="2" placeholder="Street, City, Zip Code..." required></textarea>
            </div>
            
            <div class="mb-4">
                <label for="role" class="form-label">Account Type</label>
                <select class="form-select" id="role">
                    <option value="customer" selected>Customer (Buy products)</option>
                    <option value="vendor">Vendor (List & sell products)</option>
                </select>
            </div>
            
            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-auth-submit btn-lg fs-6">Sign Up</button>
            </div>
            
            <div class="text-center fs-7 text-white-50 mt-3">
                Already have an account? <a href="/login" class="text-white fw-semibold text-decoration-none hover-underline">Login here</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/auth_validation.js"></script>
{% endblock %}
