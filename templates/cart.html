{% extends "base.html" %}

{% block title %}Hyperlocal Marketplace - Cart{% endblock %}

{% block content %}
<div class="container my-5">
    <div id="cartContainer" class="animate-fade-in-up">
        <!-- Dynamic shopping cart elements and subtotals loaded via JavaScript -->
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading cart...</span>
            </div>
            <p class="text-muted mt-2">Checking cart session...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/cart.js"></script>
{% endblock %}
