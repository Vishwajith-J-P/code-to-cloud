{% extends "vendor/base.html" %}

{% block title %}Add New Product{% endblock %}
{% block page_title %}Add New Product{% endblock %}

{% block content %}
<form action="/vendor/products" method="POST">
    <div class="row g-4">
        <!-- Main Form Area -->
        <div class="col-12 col-lg-8">
            <div class="card border-0 shadow-sm rounded-3 mb-4">
                <div class="card-header bg-white border-bottom py-3 px-4">
                    <h6 class="mb-0 fw-bold text-dark">Basic Information</h6>
                </div>
                <div class="card-body p-4">
                    <div class="mb-3">
                        <label for="productName" class="form-label fw-medium text-secondary fs-7">Product Name</label>
                        <input type="text" class="form-control" id="productName" placeholder="e.g. Organic Bananas" required>
                    </div>
                    <div class="mb-3">
                        <label for="productDescription" class="form-label fw-medium text-secondary fs-7">Description</label>
                        <textarea class="form-control" id="productDescription" rows="5" placeholder="Detailed product description..."></textarea>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm rounded-3 mb-4">
                <div class="card-header bg-white border-bottom py-3 px-4">
                    <h6 class="mb-0 fw-bold text-dark">Pricing & Inventory</h6>
                </div>
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="productPrice" class="form-label fw-medium text-secondary fs-7">Price ($)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">$</span>
                                <input type="number" step="0.01" class="form-control border-start-0 pl-0" id="productPrice" placeholder="0.00" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="productSKU" class="form-label fw-medium text-secondary fs-7">SKU (Stock Keeping Unit)</label>
                            <input type="text" class="form-control" id="productSKU" placeholder="e.g. BAN-ORG-01">
                        </div>
                        <div class="col-md-6">
                            <label for="productStock" class="form-label fw-medium text-secondary fs-7">Stock Quantity</label>
                            <input type="number" class="form-control" id="productStock" value="1" min="0">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar Form Area -->
        <div class="col-12 col-lg-4">
            <div class="card border-0 shadow-sm rounded-3 mb-4">
                <div class="card-header bg-white border-bottom py-3 px-4">
                    <h6 class="mb-0 fw-bold text-dark">Organization</h6>
                </div>
                <div class="card-body p-4">
                    <div class="mb-3">
                        <label for="productCategory" class="form-label fw-medium text-secondary fs-7">Category</label>
                        <select class="form-select" id="productCategory" required>
                            <option value="" selected disabled>Select Category</option>
                            <option value="1">Electronics</option>
                            <option value="2">Groceries</option>
                            <option value="3">Clothing</option>
                            <option value="4">Home & Garden</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="productStatus" class="form-label fw-medium text-secondary fs-7">Status</label>
                        <select class="form-select" id="productStatus">
                            <option value="active" selected>Active</option>
                            <option value="draft">Draft</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm rounded-3 mb-4">
                <div class="card-header bg-white border-bottom py-3 px-4">
                    <h6 class="mb-0 fw-bold text-dark">Product Image</h6>
                </div>
                <div class="card-body p-4 text-center">
                    <div class="border border-dashed rounded-3 p-4 mb-3 bg-light">
                        <i class="bi bi-cloud-arrow-up fs-1 text-secondary mb-2"></i>
                        <p class="text-muted fs-7 mb-0">Drag and drop image here or click to browse</p>
                    </div>
                    <input type="file" class="form-control form-control-sm" id="productImage" accept="image/*">
                </div>
            </div>

            <!-- Actions -->
            <div class="d-flex gap-2 justify-content-end">
                <a href="/vendor/products" class="btn btn-light shadow-sm text-secondary fw-medium px-4">Cancel</a>
                <button type="submit" class="btn btn-primary shadow-sm fw-medium px-4">Save Product</button>
            </div>
        </div>
    </div>
</form>
{% endblock %}
