<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Login - Hyperlocal Marketplace</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <!-- Vendor Custom CSS -->
    <link href="/static/css/vendor.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f3f4f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 450px;
            width: 100%;
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }
    </style>
</head>
<body>

    <div class="card login-card">
        <div class="login-header">
            <h2 class="fw-bold mb-1 d-flex align-items-center justify-content-center gap-2">
                <i class="bi bi-shop"></i> Vendor Portal
            </h2>
            <p class="text-white-50 mb-0">Sign in to manage your store</p>
        </div>
        <div class="card-body p-4 p-md-5">
            <form action="/vendor/dashboard" method="GET">
                <div class="mb-4">
                    <label for="email" class="form-label fw-medium text-secondary">Email address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" class="form-control bg-light border-start-0" id="email" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label for="password" class="form-label fw-medium text-secondary">Password</label>
                        <a href="#" class="text-decoration-none text-primary fs-7">Forgot password?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" class="form-control bg-light border-start-0" id="password" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label text-secondary fs-7" for="rememberMe">Remember me</label>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg fw-semibold shadow-sm">Sign In</button>
                </div>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-muted fs-7 mb-0">Don't have a vendor account? <a href="#" class="text-decoration-none fw-medium">Apply now</a></p>
                <div class="mt-3">
                    <a href="/" class="text-decoration-none text-secondary fs-7"><i class="bi bi-arrow-left me-1"></i> Back to main site</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
