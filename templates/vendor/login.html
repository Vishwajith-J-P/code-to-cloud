{% extends "base.html" %}

{% block title %}Hyperlocal Marketplace - Vendor Sign In{% endblock %}

{% block content %}
<link href="/static/css/auth_pages.css" rel="stylesheet">

<div class="auth-bg-wrapper">
    <div class="auth-bg-blob auth-bg-blob-1"></div>
    <div class="auth-bg-blob auth-bg-blob-2"></div>
    <div class="auth-bg-blob auth-bg-blob-3"></div>

    <div class="glass-auth-card animate-fade-in-up">
        <div class="text-center mb-4">
            <h2 class="fw-bold mb-1">Vendor Portal</h2>
            <p class="text-white-50 fs-7">Access your store dashboard and manage listings</p>
        </div>

        <!-- Role Switch Tab Menu -->
        <div class="auth-role-tabs">
            <a href="/login" class="auth-role-tab">Customer</a>
            <a href="/vendor/login" class="auth-role-tab active">Vendor</a>
            <a href="/admin/login" class="auth-role-tab">Admin</a>
        </div>

        <div class="auth-alert-container"></div>

        <form id="glassLoginForm" data-role="vendor" novalidate>
            <div class="mb-3">
                <label for="email" class="form-label">Vendor Email</label>
                <input type="email" class="form-control" id="email" placeholder="store@example.com" required>
            </div>
            
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label for="password" class="form-label mb-0">Password</label>
                </div>
                <div class="password-field-container">
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                    <button type="button" class="password-toggle-btn" aria-label="Toggle Password Visibility">
                        <i class="bi bi-eye-slash fs-5"></i>
                    </button>
                </div>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mb-4 fs-7">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label text-white-50" for="rememberMe">Remember store credentials</label>
                </div>
            </div>
            
            <div class="d-grid mb-4">
                <button type="submit" class="btn btn-auth-submit btn-lg fs-6">Vendor Sign In</button>
            </div>
            
            <div class="text-center fs-7 text-white-50">
                Want to register your store? <a href="/register" class="text-white fw-semibold text-decoration-none hover-underline">Register here</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/auth_validation.js"></script>
{% endblock %}
