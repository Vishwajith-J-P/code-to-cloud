<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vendor Dashboard for Hyperlocal Marketplace">
    <title>{% block title %}Vendor Dashboard{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <!-- Vendor Custom CSS -->
    <link href="/static/css/vendor.css" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="d-flex" id="wrapper">
        
        <!-- Sidebar -->
        <div class="sidebar text-white shadow" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4 fs-4 fw-bold text-uppercase d-flex align-items-center justify-content-center gap-2">
                <i class="bi bi-shop text-primary"></i> Vendor
            </div>
            <div class="list-group list-group-flush mt-3 px-3">
                <a href="/vendor/dashboard" class="list-group-item list-group-item-action py-3 ripple text-white rounded mb-2 {% if request.path == '/vendor/dashboard' %}active-nav{% endif %}">
                    <i class="bi bi-speedometer2 me-3"></i><span>Dashboard</span>
                </a>
                <a href="/vendor/products" class="list-group-item list-group-item-action py-3 ripple text-white rounded mb-2 {% if request.path.startswith('/vendor/products') %}active-nav{% endif %}">
                    <i class="bi bi-box-seam me-3"></i><span>My Products</span>
                </a>
                <a href="/vendor/orders" class="list-group-item list-group-item-action py-3 ripple text-white rounded mb-2 {% if request.path.startswith('/vendor/orders') %}active-nav{% endif %}">
                    <i class="bi bi-cart-check me-3"></i><span>Orders</span>
                </a>
                <a href="/vendor/profile" class="list-group-item list-group-item-action py-3 ripple text-white rounded mb-2 {% if request.path == '/vendor/profile' %}active-nav{% endif %}">
                    <i class="bi bi-person me-3"></i><span>Profile</span>
                </a>
                <a href="/" class="list-group-item list-group-item-action py-3 ripple text-white rounded mt-auto mb-2 text-danger">
                    <i class="bi bi-box-arrow-right me-3"></i><span>Logout</span>
                </a>
            </div>
        </div>
        <!-- /#sidebar-wrapper -->

        <!-- Page Content -->
        <div id="page-content-wrapper" class="w-100 bg-light">
            <!-- Top navigation -->
            <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 px-4 shadow-sm topbar">
                <div class="d-flex align-items-center">
                    <i class="bi bi-list fs-3 text-secondary me-3" id="menu-toggle" role="button"></i>
                    <h2 class="fs-4 m-0 fw-bold text-dark">{% block page_title %}Dashboard{% endblock %}</h2>
                </div>

                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mt-2 mt-lg-0 align-items-center">
                        <li class="nav-item me-3 position-relative">
                            <a class="nav-link text-secondary" href="#">
                                <i class="bi bi-bell fs-5"></i>
                                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.6rem;">
                                    3
                                </span>
                            </a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle text-secondary d-flex align-items-center gap-2" href="#" id="navbarDropdown"
                                role="button" data-bs-toggle="dropdown" aria-haspopup="true"
                                aria-expanded="false">
                                <img src="https://ui-avatars.com/api/?name=Vendor+User&background=0d6efd&color=fff" alt="User Avatar" class="rounded-circle" width="32" height="32">
                                <span class="fw-medium">Vendor Admin</span>
                            </a>
                            <div class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-2" aria-labelledby="navbarDropdown">
                                <a class="dropdown-item py-2" href="/vendor/profile"><i class="bi bi-person me-2 text-muted"></i>Profile</a>
                                <a class="dropdown-item py-2" href="#"><i class="bi bi-gear me-2 text-muted"></i>Settings</a>
                                <div class="dropdown-divider"></div>
                                <a class="dropdown-item py-2 text-danger" href="/"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
                            </div>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <div class="container-fluid p-4 main-content">
                {% block content %}{% endblock %}
            </div>
        </div>
        <!-- /#page-content-wrapper -->
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Vendor JS -->
    <script src="/static/js/vendor.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
