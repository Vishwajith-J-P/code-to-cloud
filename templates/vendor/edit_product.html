{% extends "vendor/base.html" %}

{% block title %}Edit Product{% endblock %}
{% block page_title %}Edit Product: MacBook Pro M2{% endblock %}

{% block content %}
<form action="/vendor/products/update/1" method="POST">
    <div class="row g-4">
        <!-- Main Form Area -->
        <div class="col-12 col-lg-8">
            <div class="card border-0 shadow-sm rounded-3 mb-4">
                <div class="card-header bg-white border-bottom py-3 px-4 d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold text-dark">Basic Information</h6>
                    <span class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-3">Active</span>
                </div>
                <div class="card-body p-4">
                    <div class="mb-3">
                        <label for="productName" class="form-label fw-medium text-secondary fs-7">Product Name</label>
                        <input type="text" class="form-control" id="productName" value="MacBook Pro M2" required>
                    </div>
                    <div class="mb-3">
                        <label for="productDescription" class="form-label fw-medium text-secondary fs-7">Description</label>
                        <textarea class="form-control" id="productDescription" rows="5">The Apple MacBook Pro M2 brings phenomenal performance to the pro notebook. The M2 chip delivers incredible power for complex workflows.</textarea>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm rounded-3 mb-4">
                <div class="card-header bg-white border-bottom py-3 px-4">
                    <h6 class="mb-0 fw-bold text-dark">Pricing & Inventory</h6>
                </div>
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="productPrice" class="form-label fw-medium text-secondary fs-7">Price ($)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">$</span>
                                <input type="number" step="0.01" class="form-control border-start-0 pl-0" id="productPrice" value="1299.00" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="productSKU" class="form-label fw-medium text-secondary fs-7">SKU (Stock Keeping Unit)</label>
                            <input type="text" class="form-control" id="productSKU" value="MAC-PRO-M2-256">
                        </div>
                        <div class="col-md-6">
                            <label for="productStock" class="form-label fw-medium text-secondary fs-7">Stock Quantity</label>
                            <input type="number" class="form-control" id="productStock" value="45" min="0">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar Form Area -->
        <div class="col-12 col-lg-4">
            <div class="card border-0 shadow-sm rounded-3 mb-4">
                <div class="card-header bg-white border-bottom py-3 px-4">
                    <h6 class="mb-0 fw-bold text-dark">Organization</h6>
                </div>
                <div class="card-body p-4">
                    <div class="mb-3">
                        <label for="productCategory" class="form-label fw-medium text-secondary fs-7">Category</label>
                        <select class="form-select" id="productCategory" required>
                            <option value="1" selected>Electronics</option>
                            <option value="2">Groceries</option>
                            <option value="3">Clothing</option>
                            <option value="4">Home & Garden</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="productStatus" class="form-label fw-medium text-secondary fs-7">Status</label>
                        <select class="form-select" id="productStatus">
                            <option value="active" selected>Active</option>
                            <option value="draft">Draft</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm rounded-3 mb-4">
                <div class="card-header bg-white border-bottom py-3 px-4">
                    <h6 class="mb-0 fw-bold text-dark">Product Image</h6>
                </div>
                <div class="card-body p-4 text-center">
                    <div class="mb-3 rounded overflow-hidden shadow-sm">
                        <div class="bg-light d-flex align-items-center justify-content-center" style="height: 180px;">
                            <i class="bi bi-laptop fs-1 text-secondary"></i>
                        </div>
                    </div>
                    <input type="file" class="form-control form-control-sm" id="productImage" accept="image/*">
                </div>
            </div>

            <!-- Actions -->
            <div class="d-flex flex-column gap-2">
                <button type="submit" class="btn btn-primary shadow-sm fw-medium w-100">Update Product</button>
                <a href="/vendor/products" class="btn btn-light shadow-sm text-secondary fw-medium w-100">Cancel</a>
                <hr class="my-2 border-secondary">
                <button type="button" class="btn btn-outline-danger fw-medium w-100"><i class="bi bi-trash me-1"></i> Delete Product</button>
            </div>
        </div>
    </div>
</form>
{% endblock %}
