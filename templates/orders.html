{% extends "base.html" %}

{% block title %}Hyperlocal Marketplace - My Orders{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <h2 class="fw-bold mb-4 animate-fade-in-up">Order History</h2>
            <div id="ordersContainer" class="animate-fade-in-up" style="animation-delay: 0.1s;">
                <!-- Dynamic order items loaded via JavaScript -->
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading orders...</span>
                    </div>
                    <p class="text-muted mt-2">Fetching your order history logs...</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/cart.js"></script>
{% endblock %}
